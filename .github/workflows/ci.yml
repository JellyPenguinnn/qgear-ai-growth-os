name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-and-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/qgear-core -e packages/qgear-ingest -e packages/qgear-ai -e apps/api

      - name: Run tests
        run: python scripts/run_tests.py

      - name: Compile Python
        run: python -m compileall packages apps/api scripts tests

      - name: Validate seed data
        run: python scripts/seed_local_data.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev
